<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calidad del Vino</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h2>🍷 Catador de Vino con Machine Learning</h2>
    <form action="/" method="post">
        Acidez Fija: <input type="number" step="any" name="fixed_acidity" value="7.4" required><br><br>
        Acidez Volátil: <input type="number" step="any" name="volatile_acidity" value="0.7" required><br><br>
        Ácido Cítrico: <input type="number" step="any" name="citric_acid" value="0.0" required><br><br>
        Azúcar Residual: <input type="number" step="any" name="residual_sugar" value="1.9" required><br><br>
        Cloruros: <input type="number" step="any" name="chlorides" value="0.076" required><br><br>
        SO2 Libre: <input type="number" step="any" name="free_sulfur_dioxide" value="11" required><br><br>
        SO2 Total: <input type="number" step="any" name="total_sulfur_dioxide" value="34" required><br><br>
        Densidad: <input type="number" step="any" name="density" value="0.9978" required><br><br>
        pH: <input type="number" step="any" name="pH" value="3.51" required><br><br>
        Sulfatos: <input type="number" step="any" name="sulphates" value="0.56" required><br><br>
        Alcohol: <input type="number" step="any" name="alcohol" value="9.4" required><br><br>
        <input type="submit" value="Predecir Calidad">
    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}
</body>
</html>
